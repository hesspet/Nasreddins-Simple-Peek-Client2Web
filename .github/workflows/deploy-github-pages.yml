name: GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v6

      - name: .NET einrichten
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Pages einrichten
        uses: actions/configure-pages@v6

      - name: Veröffentlichen
        run: dotnet publish NasreddinsSimplePeekClient2Web.csproj -c Release -o publish

      - name: GitHub-Pages-Pfad vorbereiten
        shell: bash
        run: |
          set -euo pipefail
          repository_name="${GITHUB_REPOSITORY#*/}"
          base_href="/${repository_name}/"
          publish_root="publish/wwwroot"
          sed -i "s#<base href=\"/\" />#<base href=\"${base_href}\" />#" "${publish_root}/index.html"
          cp "${publish_root}/index.html" "${publish_root}/404.html"
          touch "${publish_root}/.nojekyll"

      - name: Pages-Artefakt hochladen
        uses: actions/upload-pages-artifact@v5
        with:
          path: publish/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Zu GitHub Pages deployen
        id: deployment
        uses: actions/deploy-pages@v5
